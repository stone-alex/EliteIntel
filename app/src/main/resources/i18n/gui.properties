settings.audio.micHelp=<html><div style='text-align: left; white-space: pre-wrap;'><center><h1>When you speak you should see <span style="color:#44CC66FF;">green</span>, else <span style="color:#FF4444FF;">red</span></h1></center><ul><li> <b><span style="color:#FF4444FF;">RED</span></b> mic gate is closed - we are not sending audio<br><li> <b><span style="color:#FF8C00FF;">AMBER</span></b> gate opens sometimes, but cuts off your words - expect incorrect transcriptions<br><li> <b><span style="color:#44CC66FF;">GREEN</span></b> with <span style="color:#FF4444FF;">red</span> clipping indicator means your mic is too hot - expect transcription errors<br><li> <b><span style="color:#44CC66FF;">GREEN</span></b> All good<br></ul><hr style="color:#1E2035FF;"/><p style="font-size:12pt;"><b>STT Threads</b> Request processor (CPU) to allocate threads for speech recognition. This is a min/max setting. Meaning you can request 11 threads, but only 4 will be used. This setting does not improve quality, only speed. Switching to Cloud TTS or to Local TTS will reset all ship voices to EMMA. Personalities and cadences will be preserved.</p></div></html>
