settings.audio.micHelp=<html><div style='text-align: left; white-space: pre-wrap;'><center><h1>Wenn du sprichst, sollte <span style="color:#44CC66FF;">Grün</span> angezeigt werden, sonst <span style="color:#FF4444FF;">Rot</span></h1></center><ul><li> <b><span style="color:#FF4444FF;">ROT</span></b> Mikrofon-Gate ist geschlossen - es wird kein Audio gesendet<br><li> <b><span style="color:#FF8C00FF;">GELB</span></b> Gate öffnet manchmal, schneidet aber Wörter ab - fehlerhafte Transkriptionen sind zu erwarten<br><li> <b><span style="color:#44CC66FF;">GRÜN</span></b> mit <span style="color:#FF4444FF;">roter</span> Clipping-Anzeige bedeutet, dass dein Mikrofon zu laut ist - Transkriptionsfehler sind zu erwarten<br><li> <b><span style="color:#44CC66FF;">GRÜN</span></b> Alles in Ordnung<br></ul><hr style="color:#1E2035FF;"/><p style="font-size:12pt;"><b>STT-Threads</b> Der Anfrageprozessor (CPU) soll Threads für die Spracherkennung zuweisen. Dies ist eine Min-/Max-Einstellung. Das heißt: Du kannst 11 Threads anfordern, aber möglicherweise werden nur 4 verwendet. Diese Einstellung verbessert nicht die Qualität, sondern nur die Geschwindigkeit. Der Wechsel zu Cloud-TTS oder lokalem TTS setzt alle Schiffsstimmen auf EMMA zurück. Persönlichkeiten und Sprechweisen bleiben erhalten.</p></div></html>
settings.audio.switchTts.message=Der Wechsel der TTS-Engine setzt alle Schiffsstimmen auf EMMA zurück.\nPersönlichkeiten und Sprechweisen bleiben erhalten.\n\nDu musst die Stimmen deiner Flotte neu konfigurieren.\nFortfahren?
