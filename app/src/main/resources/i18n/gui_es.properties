settings.audio.micHelp=<html><div style='text-align: left; white-space: pre-wrap;'><center><h1>Cuando hables deberías ver <span style="color:#44CC66FF;">verde</span>, si no <span style="color:#FF4444FF;">rojo</span></h1></center><ul><li> <b><span style="color:#FF4444FF;">ROJO</span></b> la compuerta del micrófono está cerrada: no estamos enviando audio<br><li> <b><span style="color:#FF8C00FF;">ÁMBAR</span></b> la compuerta se abre a veces, pero corta tus palabras: espera transcripciones incorrectas<br><li> <b><span style="color:#44CC66FF;">VERDE</span></b> con indicador de clipping en <span style="color:#FF4444FF;">rojo</span> significa que el micrófono está demasiado alto: espera errores de transcripción<br><li> <b><span style="color:#44CC66FF;">VERDE</span></b> Todo bien<br></ul><hr style="color:#1E2035FF;"/><p style="font-size:12pt;"><b>Hilos de STT</b> Solicita al procesador de peticiones (CPU) que asigne hilos para el reconocimiento de voz. Esta es una configuración de mínimo/máximo. Eso significa que puedes pedir 11 hilos, pero quizá solo se usarán 4. Esta configuración no mejora la calidad, solo la velocidad. Cambiar a TTS en la nube o a TTS local restablecerá todas las voces de las naves a EMMA. Las personalidades y las cadencias se conservarán.</p></div></html>
