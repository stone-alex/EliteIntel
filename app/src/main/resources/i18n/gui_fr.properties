settings.audio.micHelp=<html><div style='text-align: left; white-space: pre-wrap;'><center><h1>Quand vous parlez, vous devriez voir <span style="color:#44CC66FF;">vert</span>, sinon <span style="color:#FF4444FF;">rouge</span></h1></center><ul><li> <b><span style="color:#FF4444FF;">ROUGE</span></b> le gate micro est fermé - aucun audio n'est envoyé<br><li> <b><span style="color:#FF8C00FF;">AMBRE</span></b> le gate s'ouvre parfois, mais coupe des mots - attendez-vous à des transcriptions incorrectes<br><li> <b><span style="color:#44CC66FF;">VERT</span></b> avec indicateur de clipping <span style="color:#FF4444FF;">rouge</span> signifie que votre micro est trop fort - attendez-vous à des erreurs de transcription<br><li> <b><span style="color:#44CC66FF;">VERT</span></b> Tout va bien<br></ul><hr style="color:#1E2035FF;"/><p style="font-size:12pt;"><b>STT Threads</b> Demande au processeur (CPU) d'allouer des threads pour la reconnaissance vocale. C'est un réglage min/max. Vous pouvez demander 11 threads, mais seulement 4 peuvent être utilisés. Ce réglage améliore la vitesse, pas la qualité. Passer au TTS cloud ou local réinitialise toutes les voix des vaisseaux sur EMMA. Les personnalités et cadences sont conservées.</p></div></html>
