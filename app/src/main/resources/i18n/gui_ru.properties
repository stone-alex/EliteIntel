settings.audio.micHelp=<html><div style='text-align: left; white-space: pre-wrap;'><center><h1>Когда вы говорите, индикатор должен быть <span style="color:#44CC66FF;">зелёным</span>, иначе он будет <span style="color:#FF4444FF;">красным</span></h1></center><ul><li> <b><span style="color:#FF4444FF;">КРАСНЫЙ</span></b> входной порог микрофона закрыт — аудио не отправляется<br><li> <b><span style="color:#FF8C00FF;">ОРАНЖЕВЫЙ</span></b> порог иногда открывается, но обрезает слова — возможны неправильные распознавания<br><li> <b><span style="color:#44CC66FF;">ЗЕЛЁНЫЙ</span></b> с <span style="color:#FF4444FF;">красным</span> индикатором перегруза означает, что уровень микрофона слишком высокий — возможны ошибки распознавания<br><li> <b><span style="color:#44CC66FF;">ЗЕЛЁНЫЙ</span></b> всё в порядке<br></ul><hr style="color:#1E2035FF;"/><p style="font-size:12pt;"><b>Потоки STT</b> — количество потоков CPU, запрашиваемое для распознавания речи. Это настройка min/max: можно запросить 11 потоков, но использоваться будут только 4. Эта настройка влияет не на качество, а только на скорость. Переключение на облачный TTS или локальный TTS сбросит все голоса кораблей на EMMA. Характеры и темп речи будут сохранены.</p></div></html>
settings.audio.switchTts.message=Переключение движка TTS сбросит все голоса кораблей на EMMA.\nХарактеры и темп речи будут сохранены.\n\nВам нужно будет заново настроить голоса вашего флота.\nПродолжить?
