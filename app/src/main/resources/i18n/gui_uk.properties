settings.audio.micHelp=<html><div style='text-align: left; white-space: pre-wrap;'><center><h1>Коли ви говорите, має бути <span style="color:#44CC66FF;">зелений</span> індикатор, інакше — <span style="color:#FF4444FF;">червоний</span></h1></center><ul><li> <b><span style="color:#FF4444FF;">ЧЕРВОНИЙ</span></b> мікрофонний поріг закритий — аудіо не надсилається<br><li> <b><span style="color:#FF8C00FF;">ЖОВТИЙ</span></b> поріг іноді відкривається, але обрізає слова — очікуйте помилки розпізнавання<br><li> <b><span style="color:#44CC66FF;">ЗЕЛЕНИЙ</span></b> з <span style="color:#FF4444FF;">червоним</span> індикатором перевантаження означає, що мікрофон занадто гучний — очікуйте помилки розпізнавання<br><li> <b><span style="color:#44CC66FF;">ЗЕЛЕНИЙ</span></b> усе гаразд<br></ul><hr style="color:#1E2035FF;"/><p style="font-size:12pt;"><b>Потоки STT</b> вказують CPU, скільки потоків виділити для розпізнавання мовлення. Це налаштування мінімуму/максимуму. Тобто можна запросити 11 потоків, але буде використано лише 4. Це налаштування не покращує якість, а лише швидкість. Перемикання на хмарний TTS або локальний TTS скине всі голоси кораблів до EMMA. Характери та манери мовлення буде збережено.</p></div></html>
settings.audio.switchTts.message=Перемикання рушія TTS скине всі голоси кораблів до EMMA.\nХарактери та манери мовлення буде збережено.\n\nВам потрібно буде заново налаштувати голоси вашого флоту.\nПродовжити?
