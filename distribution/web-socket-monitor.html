<!--
When services are running, the LLM exchange is available via websocket on port 7497
This file helps to test the websocket connection to the LLM exchange
-->

<!DOCTYPE html>
<html style="background-color: #000000; color:#ff8e12; font-family: Arial, sans-serif; font-size: 14px;" lang="EN-US">
<body>
<pre id="log"></pre>
<script>
    const log = document.getElementById('log');
    const ws = new WebSocket('ws://localhost:7497');
    ws.onopen = () => append('connected');
    ws.onclose = () => append('disconnected');
    ws.onerror = e => append('error: ' + e);
    ws.onmessage = e => append(JSON.stringify(JSON.parse(e.data), null, 2));

    function append(msg) {
        log.textContent += msg + '\n---\n';
    }
</script>
</body>
</html>
